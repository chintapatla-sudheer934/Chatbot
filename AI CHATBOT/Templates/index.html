<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beautiful AI Chatbot</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #e0f7fa, #e1bee7);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .chat-container {
            width: 450px;
            height: 650px;
            background: #ffffffee;
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 2px solid #a29bfe;
        }

        .chat-header {
            background: linear-gradient(135deg, #6c5ce7, #00b894);
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 1px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .chat-box {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #f7f7f7;
        }

        .message {
            padding: 14px 18px;
            border-radius: 25px;
            max-width: 75%;
            word-wrap: break-word;
            font-size: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.08);
            transition: transform 0.2s;
        }

        .message:hover {
            transform: scale(1.02);
        }

        .user-message {
            background: linear-gradient(135deg, #81ecec, #74b9ff);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }

        .bot-message {
            background: linear-gradient(135deg, #ffeaa7, #fab1a0);
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }

        img.chat-image {
            max-width: 100%;
            border-radius: 15px;
            margin-top: 5px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.1);
        }

        .input-area {
            display: flex;
            border-top: 1px solid #ddd;
            padding: 12px;
            background: #f0f0f0;
        }

        input {
            flex: 1;
            padding: 12px 15px;
            border-radius: 25px;
            border: 1px solid #ccc;
            outline: none;
            font-size: 15px;
            margin-right: 10px;
            transition: 0.3s;
        }

        input:focus {
            border-color: #6c5ce7;
            box-shadow: 0 0 8px rgba(108,92,231,0.3);
        }

        button {
            background: linear-gradient(135deg, #6c5ce7, #00b894);
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(108,92,231,0.3);
        }

        /* Highlight styles */
        .highlight {
            font-weight: 700;
            color: #d63031; /* red */
        }

        .bold-highlight {
            font-weight: 700;
            color: #0984e3; /* blue */
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">Beautiful AI Chatbot</div>
        <div class="chat-box" id="chat-box">
            <div class="message bot-message">
                Hello! Ask me anything and I will highlight important parts.
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type your message..." />
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        function formatHighlights(text) {
            // ***text*** -> red bold highlight
            text = text.replace(/\*\*\*(.*?)\*\*\*/g, '<span class="highlight">$1</span>');
            // **text** -> blue bold highlight
            text = text.replace(/\*\*(.*?)\*\*/g, '<span class="bold-highlight">$1</span>');
            return text;
        }

        async function sendMessage() {
            const inputField = document.getElementById("user-input");
            const userMessage = inputField.value.trim();
            const chatBox = document.getElementById("chat-box");

            if (userMessage === "") return;

            // Add user message
            const userMsgElem = document.createElement("div");
            userMsgElem.className = "message user-message";
            userMsgElem.textContent = userMessage;
            chatBox.appendChild(userMsgElem);

            inputField.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: userMessage })
                });

                const data = await response.json();

                const botMsgElem = document.createElement("div");
                botMsgElem.className = "message bot-message";

                if (data.response) {
                    botMsgElem.innerHTML = formatHighlights(data.response);
                } else {
                    botMsgElem.textContent = data.error || "Error: No response";
                }

                chatBox.appendChild(botMsgElem);
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (error) {
                const errorElem = document.createElement("div");
                errorElem.className = "message bot-message";
                errorElem.textContent = "Error: Could not connect to server.";
                chatBox.appendChild(errorElem);
            }
        }

        document.getElementById("user-input").addEventListener("keypress", function(e) {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
